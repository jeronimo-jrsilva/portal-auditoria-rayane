<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>🛡️ Relatório de Auditoria 2026</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root { --primary: #1a3a5f; --accent: #c9a55c; --bg: #f0f2f5; --whatsapp-bg: #e5ddd5; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; }
        header { background: var(--primary); color: white; text-align: center; padding: 2rem 0; border-bottom: 4px solid var(--accent); }
        .nav { background: white; border-bottom: 1px solid #ddd; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .nav a { margin: 0 15px; text-decoration: none; color: var(--primary); font-weight: bold; font-size: 0.9rem; cursor: pointer; }
        #unlock-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; color: white; transition: all 0.5s ease; }
        #unlock-overlay.unlocked { opacity: 0; pointer-events: none; }
        .unlock-box { background: #fff; padding: 2.5rem; border-radius: 12px; color: #1c1e21; text-align: center; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .unlock-box h2 { margin-top: 0; color: var(--primary); }
        .unlock-box input { width: 100%; padding: 12px; margin: 1.5rem 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1rem; text-align: center; }
        .unlock-box button { background: var(--primary); color: white; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .container-view { max-width: 850px; margin: 2rem auto; padding: 0 20px; }
        .chat-container { background: var(--whatsapp-bg); padding: 20px; border-radius: 8px; display: flex; flex-direction: column; min-height: 400px; }
        .day-divider { text-align: center; margin: 25px 0; }
        .day-divider span { background: white; padding: 6px 15px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; color: #54656f; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .system-msg { text-align: center; font-size: 0.75rem; color: #54656f; background: #fff9c4; margin: 10px auto; padding: 6px 15px; border-radius: 8px; width: fit-content; max-width: 80%; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 8px; margin-bottom: 8px; position: relative; box-shadow: 0 1px 1px rgba(0,0,0,0.1); font-size: 0.95rem; line-height: 1.5; }
        .bubble.recipient { background: white; align-self: flex-start; border-top-left-radius: 0; }
        .bubble.me { background: #dcf8c6; align-self: flex-end; border-top-right-radius: 0; }
        .bubble .sender { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; }
        .bubble.recipient .sender { color: #128c7e; }
        .bubble.me .sender { color: #075e54; text-align: right; }
        .bubble .time { display: block; font-size: 0.65rem; color: #667781; text-align: right; margin-top: 6px; }
        .media-box { background: rgba(0,0,0,0.05); padding: 10px; border-radius: 6px; margin: 10px 0; text-align: center; border: 1px dashed #ccc; }
        .timeline-container { padding: 20px; border-left: 2px solid var(--accent); }
        .timeline-event { position: relative; margin-bottom: 35px; padding-left: 35px; }
        .timeline-event::before { content: ''; position: absolute; left: -9px; top: 5px; width: 16px; height: 16px; border-radius: 50%; background: var(--primary); border: 3px solid #fff; z-index: 2; }
        .event-card { background: white; padding: 1.2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); border-left: 5px solid var(--primary); }
        .event-card.critical { border-left-color: var(--danger); }
        .event-card.warning { border-left-color: var(--warning); }
        .event-date { color: var(--accent); font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 5px; }
        .event-title { margin: 0 0 8px 0; color: var(--primary); font-size: 1.1rem; }
        .event-desc { font-size: 0.9rem; color: #444; line-height: 1.4; margin: 0; }
        
        .legend { display: flex; gap: 15px; justify-content: center; margin-bottom: 20px; flex-wrap: wrap; }
        .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: bold; color: #666; }
        .legend-color { width: 10px; height: 10px; border-radius: 2px; }
        
        .hidden { display: none; }
        #error-msg { color: #ff4444; font-size: 0.85rem; margin-top: 10px; display: none; }
        video, audio { max-width: 100%; border-radius: 4px; }
    </style>
</head>
<body>
<div id="unlock-overlay">
    <div class="unlock-box">
        <h2>🛡️ Acesso de Auditoria</h2>
        <p>Dados cifrados em <strong>AES-256-CBC</strong>.</p>
        <input type="password" id="unlock-pass" placeholder="Chave Mestra" onkeypress="if(event.key === 'Enter') tryUnlock()">
        <button onclick="tryUnlock()">Desbloquear Relatório</button>
        <div id="error-msg">Chave inválida ou dados corrompidos.</div>
    </div>
</div>
<header>
    <h1>🛡️ Relatório de Auditoria: 2026</h1>
    <p>Evidências Consolidadas & Log de Conformidade (v8.1)</p>
</header>
<div class="nav">
    <a onclick="showView('chat')">💬 Registro de Chat</a>
    <a onclick="showView('timeline')">📅 Cronologia</a>
    <a href="javascript:location.reload()">🔒 Bloquear</a>
</div>
<main class="container-view">
    <div id="view-chat" class="chat-container"></div>
    <div id="view-timeline" class="timeline-container hidden"></div>
</main>
<script>
    let encryptedPayload = "";
    let portalData = null;

    async function loadData() {
        try {
            const res = await fetch('assets/data.enc.json?v=' + Date.now());
            const data = await res.json();
            encryptedPayload = data.payload;
            renderLocked();
        } catch(e) { 
            console.error("Erro ao carregar banco.", e); 
            document.getElementById('error-msg').innerText = "Erro ao carregar dados cifrados.";
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function decryptPayload(ciphertext, password) {
        try {
            const key = CryptoJS.SHA256(password);
            const iv = CryptoJS.MD5(password);
            const ciphertextWA = CryptoJS.enc.Base64.parse(ciphertext);
            const cipherParams = CryptoJS.lib.CipherParams.create({ ciphertext: ciphertextWA });
            const decrypted = CryptoJS.AES.decrypt(cipherParams, key, { 
                iv: iv, 
                mode: CryptoJS.mode.CBC, 
                padding: CryptoJS.pad.Pkcs7 
            });
            const decryptedStr = decrypted.toString(CryptoJS.enc.Utf8);
            if (!decryptedStr) return null;
            return JSON.parse(decryptedStr);
        } catch(e) { return null; }
    }

    function tryUnlock() {
        const pass = document.getElementById('unlock-pass').value;
        document.getElementById('error-msg').style.display = 'none';
        const data = decryptPayload(encryptedPayload, pass);
        if(data && data.chat) {
            portalData = data;
            renderAll();
            document.getElementById('unlock-overlay').classList.add('unlocked');
        } else {
            document.getElementById('error-msg').style.display = 'block';
        }
    }

    function showView(view) {
        document.getElementById('view-chat').classList.add('hidden');
        document.getElementById('view-timeline').classList.add('hidden');
        document.getElementById('view-' + view).classList.remove('hidden');
    }

    function renderLocked() {
        document.getElementById('view-chat').innerHTML = '<p style="text-align: center; color: #888; padding-top: 100px;">🔒 Conteúdo Cifrado</p>';
    }

    function renderAll() { renderChat(); renderTimeline(); }

    function renderChat() {
        const container = document.getElementById('view-chat');
        container.innerHTML = "";
        let lastDay = "";
        portalData.chat.forEach(m => {
            if (m.day !== lastDay) {
                container.innerHTML += `<div class="day-divider"><span>${m.day}</span></div>`;
                lastDay = m.day;
            }
            if (m.type === 'system') {
                container.innerHTML += `<div class="system-msg">${m.text}</div>`;
            } else if (m.type === 'chat') {
                let contentHtml = "";
                m.content.forEach(c => {
                    if (c.type === 'text') {
                        contentHtml += `<p style="margin:0 0 10px 0;">${c.val}</p>`;
                    } else if (c.type === 'media') {
                        const url = 'assets/media/' + c.file;
                        if (c.file.toLowerCase().endsWith('.mp4')) {
                            contentHtml += `<div class="media-box"><video controls><source src="${url}" type="video/mp4">Seu navegador não suporta vídeos.</video></div>`;
                        } else {
                            contentHtml += `<div class="media-box"><audio controls><source src="${url}">Seu navegador não suporta áudio.</audio></div>`;
                        }
                    }
                });
                container.innerHTML += `
                    <div class="bubble ${m.bubble}">
                        <span class="sender">${m.sender}</span>
                        <div class="msg-text">${contentHtml}</div>
                        <span class="time">${m.time}</span>
                    </div>
                `;
            }
        });
    }

    function renderTimeline() {
        const container = document.getElementById('view-timeline');
        container.innerHTML = `
            <div class="legend">
                <div class="legend-item"><div class="legend-color" style="background: var(--primary)"></div> Neutro</div>
                <div class="legend-item"><div class="legend-color" style="background: var(--warning)"></div> Desvio</div>
                <div class="legend-item"><div class="legend-color" style="background: var(--danger)"></div> Crítico</div>
            </div>
        `;
        portalData.timeline.forEach(e => {
            let statusClass = "";
            if (e.desc.toLowerCase().includes('crítico') || e.title.toLowerCase().includes('calúnia') || e.title.toLowerCase().includes('exposição') || e.title.toLowerCase().includes('ameaça')) statusClass = "critical";
            else if (e.desc.toLowerCase().includes('alerta') || e.desc.toLowerCase().includes('desvio') || e.title.toLowerCase().includes('coação')) statusClass = "warning";
            
            container.innerHTML += `
                <div class="timeline-event">
                    <div class="event-card ${statusClass}">
                        <div class="event-date">${e.date}</div>
                        <h3 class="event-title">${e.title}</h3>
                        <p class="event-desc">${e.desc}</p>
                    </div>
                </div>
            `;
        });
    }
    window.onload = loadData;
</script>
</body>
</html>
